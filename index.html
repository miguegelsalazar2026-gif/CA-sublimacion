<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Creaciones Angelismar</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; padding: 20px; }
        .card { background: white; margin: 15px auto; padding: 15px; border-radius: 10px; width: 90%; max-width: 400px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        img { width: 100%; border-radius: 5px; }
        input { width: 60px; padding: 5px; font-size: 1.2em; }
        .btn-reportar { display: block; background: #25d366; color: white; padding: 15px; text-decoration: none; border-radius: 5px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <img src="imágenes/logo.jpg" style="width:150px;">
    <h1>Creaciones Angelismar</h1>
    
    <div id="lista">
        <div class="card" data-precio="800" data-nombre="Plancha">
            <img src="imágenes/plancha.jpg">
            <h3>Plancha ($800)</h3>
            <input type="number" class="cant" value="0" min="0" oninput="calc()">
        </div>
        <div class="card" data-precio="95" data-nombre="Tazas">
            <img src="imágenes/tazas.jpg">
            <h3>Cajas de Tazas ($95)</h3>
            <input type="number" class="cant" value="0" min="0" oninput="calc()">
        </div>
        <!-- (Añade los otros bloques siguiendo este mismo formato) -->
    </div>

    <h2>Total: $<span id="total">0</span></h2>
    <h3>Anticipo (60%): $<span id="anticipo">0</span></h3>
    
    <a href="#" class="btn-reportar" onclick="reportar()">Reportar Pago por WhatsApp</a>

    <script>
        function calc() {
            let total = 0;
            document.querySelectorAll('.card').forEach(c => {
                total += c.dataset.precio * c.querySelector('.cant').value;
            });
            document.getElementById('total').innerText = total;
            document.getElementById('anticipo').innerText = (total * 0.60).toFixed(2);
        }
        function reportar() {
            let ant = document.getElementById('anticipo').innerText;
            window.location.href = "https://wa.me/584122380482?text=Reporto%20pago%20del%2060%25%20($"+ant+")";
        }
    </script>
</body>
</html>
