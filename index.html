<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CA Sublimación - Pedidos</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; text-align: center; }
        .producto { background: white; margin: 10px auto; padding: 15px; border-radius: 8px; width: 90%; max-width: 400px; }
        .producto img { width: 100px; }
        input { width: 50px; }
        #total-general { font-size: 1.5em; color: #27ae60; font-weight: bold; }
        .pago-info { background: #eee; padding: 15px; margin-top: 20px; border-radius: 8px; text-align: left; }
        .btn-reportar { display: block; background: #25d366; color: white; padding: 15px; text-decoration: none; border-radius: 5px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Creaciones Angelismar</h1>
    <p>Tecnología de Sublimación</p>

    <!-- Lista de productos -->
    <div id="lista-productos">
        <div class="producto" data-precio="800" data-nombre="Plancha">
            <h3>Plancha ($800)</h3>
            <input type="number" value="0" min="0" onchange="calcular()">
        </div>
        <div class="producto" data-precio="95" data-nombre="Cajas Tazas">
            <h3>Cajas Tazas ($95)</h3>
            <input type="number" value="0" min="0" onchange="calcular()">
        </div>
        <!-- (Repite este bloque para cada producto cambiando precio y nombre) -->
    </div>

    <h2>Total a Pagar: $<span id="total-general">0</span></h2>
    <h3>Anticipo (60%): $<span id="anticipo">0</span></h3>

    <div class="pago-info">
        <h3>Datos para Cancelar</h3>
        <p><strong>Pago Móvil:</strong> 0102 - 04122380482 - J-17891913</p>
        <p><strong>Binance ID:</strong> TBGuDDMSZCbFkMTPMYmPrRRJKyujEzbzjT</p>
    </div>

    <a href="#" class="btn-reportar" onclick="reportar()">Reportar Pago por WhatsApp</a>

    <script>
        function calcular() {
            let total = 0;
            document.querySelectorAll('.producto').forEach(p => {
                total += p.dataset.precio * p.querySelector('input').value;
            });
            document.getElementById('total-general').innerText = total;
            document.getElementById('anticipo').innerText = (total * 0.60).toFixed(2);
        }

        function reportar() {
            let total = document.getElementById('total-general').innerText;
            let ant = document.getElementById('anticipo').innerText;
            let url = "https://wa.me/584122380482?text=" + encodeURIComponent("Hola, quiero reportar el pago del 60% ($" + ant + ") del pedido total ($" + total + "). Aquí adjunto mi comprobante.");
            window.location.href = url;
        }
    </script>
</body>
</html>
